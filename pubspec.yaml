name: the_platform
description: PINC Network - Decentralized Platform
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  crypto: ^3.0.3
  shared_preferences: ^2.2.2
  
  # State Management
  flutter_bloc: ^8.1.0
  equatable: ^2.0.5
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  
  # Communication (WebRTC)
  flutter_webrtc: ^0.12.0
  
  # Encryption
  aes256: ^2.0.0
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0
  
  # Utilities
  uuid: ^4.0.0
  intl: ^0.18.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true